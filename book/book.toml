[book]
title = "ALD Cookbook - Extreme TDD for Dataset Engineering"
authors = ["Noah Gift", "PAIML Team"]
description = "A comprehensive guide to the Alimentar Dataset Format with property-based testing and Toyota Production System principles"
language = "en"
multilingual = false
src = "src"

[rust]
edition = "2021"

[build]
build-dir = "target/book"
create-missing = false

[preprocessor.links]

[output.html]
default-theme = "rust"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/paiml/ald-cookbook"
edit-url-template = "https://github.com/paiml/ald-cookbook/edit/main/book/{path}"
site-url = "/ald-cookbook/"
cname = ""
smart-punctuation = true
additional-css = []
additional-js = []

[output.html.fold]
enable = true
level = 0

[output.html.playground]
editable = true
copyable = true
copy-js = true
line-numbers = true
runnable = true

[output.html.code]
hidelines = { rust = "#" }

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-hierarchical = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
copy-js = true
